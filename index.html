<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>크놀AD · 콘텐츠 광고 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{
colors:{blue:{DEFAULT:'#3182F6',dark:'#1B64DA',deep:'#0F4FBF',tint:'#E8F3FF',soft:'#F0F6FF'},g:{50:'#F9FAFB',100:'#F2F4F6',200:'#E5E8EB',300:'#D1D6DB',400:'#B0B8C1',500:'#8B95A1',600:'#6B7684',700:'#4E5968',800:'#333D4B',900:'#191F28'}},
fontFamily:{sans:['Pretendard Variable','Pretendard','sans-serif'],display:['Pretendard Variable','Pretendard','sans-serif']},
boxShadow:{card:'0 2px 8px rgba(17,24,39,0.04),0 16px 40px rgba(17,24,39,0.07)',up:'0 -4px 20px rgba(0,0,0,0.08)',pop:'0 16px 50px rgba(17,24,39,0.16)'}}}};
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
html,body{margin:0;height:100%}
*,*::before,*::after{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif;color:#191F28;background:#F9FAFB;font-size:17.5px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-synthesis:none;-webkit-text-size-adjust:100%}
input,button,textarea,select{font-family:inherit}
.font-bold{font-weight:550!important}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";letter-spacing:-.01em}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#D1D6DB;border-radius:8px;border:3px solid #F9FAFB}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}.fade-up{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}.pop{animation:pop .25s ease both}
.cbx{transition:transform .15s cubic-bezier(.22,1.4,.4,1),background .15s,border-color .15s}
@keyframes wfglow{0%,100%{box-shadow:0 0 0 0 rgba(49,130,246,0.5)}50%{box-shadow:0 0 0 9px rgba(49,130,246,0)}}.wf-glow{animation:wfglow 1.8s ease-in-out infinite}
.pf-wrap{overflow:hidden;width:100%;-webkit-mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent);mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent)}
.pf-track{display:flex;gap:18px;width:max-content;padding:6px 0;animation:pfscroll 58s linear infinite;will-change:transform}
.pf-wrap:hover .pf-track{animation-play-state:paused}
@keyframes pfscroll{from{transform:translate3d(0,0,0)}to{transform:translate3d(-50%,0,0)}}
.pf-card{position:relative;width:232px;height:412px;border-radius:22px;overflow:hidden;flex:0 0 auto;background:#000;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.pf-card iframe{position:absolute;top:50%;left:50%;width:733px;height:412px;transform:translate(-50%,-50%);border:0;pointer-events:none}
.pf-ov{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,.06) 30%,rgba(0,0,0,.16) 56%,rgba(0,0,0,.88) 100%)}
.pf-top{position:absolute;top:14px;left:14px;right:14px;pointer-events:none}
.pf-badge{display:inline-block;color:#fff;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:10px;background:rgba(0,0,0,.42);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pf-bot{position:absolute;left:18px;right:18px;bottom:18px;color:#fff;pointer-events:none}
.pf-lab{font-size:11.5px;font-weight:700;color:rgba(255,255,255,.72);margin:0}
.pf-big{font-size:25px;font-weight:800;line-height:1.05;margin:1px 0 0;text-shadow:0 1px 8px rgba(0,0,0,.4)}
</style>
</head>
<body class="font-sans">
<div id="root"></div>
<div id="modalRoot"></div>
<script src="app.js"></script>
<script src="app2.js"></script>
</body>
</html>
